apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-app
  labels:
    app: backend-app
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          ports:
            - containerPort: {{ .Values.service.targetPort | default 3000 }}
          env:
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.cosmosdb }}
            # CosmosDB credentials from Secret
            - name: COSMOSDB_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: COSMOSDB_ENDPOINT
            - name: COSMOSDB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: COSMOSDB_DATABASE_NAME
            - name: COSMOSDB_CONTAINER_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: COSMOSDB_CONTAINER_NAME
            - name: COSMOSDB_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: COSMOSDB_KEY
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}