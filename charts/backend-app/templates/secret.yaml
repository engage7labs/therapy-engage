apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app.kubernetes.io/name: { { include "backend-app.name" . } }
    app.kubernetes.io/component: secret
    app.kubernetes.io/env: dev
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: { { .Release.Name } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    helm.sh/chart: { { include "backend-app.chart" . } }
  namespace: { { .Release.Namespace | default "default" } }
  annotations:
    helm.sh/resource-policy: keep
    environment: dev
    purpose: cosmosdb-credentials
    created-by: helm-template
    managed-by: therapyengage
    secret-type: app-config
    sealed: "false"
    description: "CosmosDB connection credentials for backend service"
type: Opaque
stringData:
  COSMOSDB_ENDPOINT: { { .Values.cosmosdb.endpoint | quote } }
  COSMOSDB_DATABASE_NAME: { { .Values.cosmosdb.database | quote } }
  COSMOSDB_CONTAINER_NAME: { { .Values.cosmosdb.container | quote } }
  COSMOSDB_KEY: { { .Values.cosmosdb.key | quote } }
