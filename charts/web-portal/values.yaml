# Therapy Engage Platform - Web Portal HELM Values
# File: charts/web-portal/values.yaml

replicaCount: 1

image:
  repository: ghcr.io/therapyengageorg/web-portal
  tag: "dev"
  pullPolicy: Always
  pullSecrets:
    - name: ghcr-secret

env: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: 134.149.41.178.sslip.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: web-portal-tls
      hosts:
        - 134.149.41.178.sslip.io