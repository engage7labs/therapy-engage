apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
        listen 80;
        location / {
            proxy_pass http://backend-app-service:3000;
            proxy_set_header Host $host;
        }
        location /dashboard {
            return 302 http://localhost:3000/dashboard;
        }
    }