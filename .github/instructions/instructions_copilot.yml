# .github/instructions/instructions\_copilot.yml (Updated)

This manifest controls where Copilot/Claude applies the instructions.

Keep it minimal and stable. The detailed content lives in the sibling

file: instructions\_copilot.instructions.md

applyTo: '\*\*'  # apply repository-wide

--- Tech baselines (for quick context; not parsed by tooling) ---

Frontend: Next.js 14 (Node 20), TypeScript 5, Tailwind, shadcn/ui

Backend:  NestJS 11 (GraphQL)

Infra:    Terraform → Azure (DEV=ACA, PROD=AKS)

#

NOTE: Project is pinned to **Next.js 14**. If you find references to 15,

align back to 14 unless explicitly authorized in a dedicated PR.

If you ever need to scope the instructions:

applyTo:

- 'apps/frontend/\*\*'

- 'infra/\*\*'

No additional keys are strictly required by the extension. Extra metadata is kept as comments to avoid schema mismatches.
