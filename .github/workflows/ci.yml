name: CI DEV - Service Principal Auth (Azure Container Apps)

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  TAG: ${{ github.sha }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build -f web/Dockerfile -t ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }} .
          docker tag ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }} ${{ env.IMAGE_FRONTEND }}:dev-latest
          docker push ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
          docker push ${{ env.IMAGE_FRONTEND }}:dev-latest

      - name: Build & Push Backend
        run: |
          docker build -f backend/apps/gateway/Dockerfile -t ${{ env.IMAGE_BACKEND }}:${{ env.TAG }} ./backend/apps/gateway
          docker tag ${{ env.IMAGE_BACKEND }}:${{ env.TAG }} ${{ env.IMAGE_BACKEND }}:dev-latest
          docker push ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}
          docker push ${{ env.IMAGE_BACKEND }}:dev-latest

      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure CLI (Install extension)
        run: |
          az extension add --name containerapp --yes || az extension update --name containerapp

      - name: Resolve Infra Variables
        id: vars
        run: |
          echo "RG=${{ secrets.RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
          echo "ACA_F=${{ secrets.ACA_FRONTEND_NAME }}" >> $GITHUB_OUTPUT
          echo "ACA_B=${{ secrets.ACA_BACKEND_NAME }}" >> $GITHUB_OUTPUT

      - name: Deploy Backend to ACA
        run: |
          az containerapp update \
            --name "${{ steps.vars.outputs.ACA_B }}" \
            --resource-group "${{ steps.vars.outputs.RG }}" \
            --image "${{ env.IMAGE_BACKEND }}:${{ env.TAG }}"

      - name: Deploy Frontend to ACA
        run: |
          az containerapp update \
            --name "${{ steps.vars.outputs.ACA_F }}" \
            --resource-group "${{ steps.vars.outputs.RG }}" \
            --image "${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}"

      - name: Wait for Revisions Ready
        run: |
          sleep 10
          az containerapp revision list \
            --name "${{ steps.vars.outputs.ACA_B }}" \
            --resource-group "${{ steps.vars.outputs.RG }}" \
            --query "[0].name"

      - name: Health Check Backend
        run: |
          BACKEND_URL=$(az containerapp show -n "${{ steps.vars.outputs.ACA_B }}" -g "${{ steps.vars.outputs.RG }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          curl -fS "https://$BACKEND_URL/health" | jq .

      - name: Health Check Frontend
        run: |
          FRONTEND_URL=$(az containerapp show -n "${{ steps.vars.outputs.ACA_F }}" -g "${{ steps.vars.outputs.RG }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          curl -fS "https://$FRONTEND_URL/api/health"
