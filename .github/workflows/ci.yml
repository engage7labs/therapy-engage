name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

env:
  NODE_VERSION: '18.x'
  AZURE_WEBAPP_NAME: therapy-engage-app
  AZURE_WEBAPP_PACKAGE_PATH: './web'

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd web
        npm ci
    
    - name: Run lint
      run: |
        cd web
        npm run lint
    
    - name: Run build
      run: |
        cd web
        npm run build
        
    - name: Run tests (if available)
      run: |
        cd web
        npm test --if-present
        
    # Upload build artifacts for deployment job
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
      with:
        name: build-files
        path: |
          web/.next
          web/package.json
          web/package-lock.json
          web/next.config.js
          web/public
        retention-days: 1

  # Job 2: Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run npm audit
      run: |
        cd web
        npm audit --audit-level=high
        
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
        command: test
        json: true

  # Job 3: Deploy to Azure (only on dev/main branch)
  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-files
        path: ./web
        
    - name: Setup Node.js for deployment
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install production dependencies
      run: |
        cd web
        npm ci --only=production
        
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  # Job 4: Health Check
  health-check:
    runs-on: ubuntu-latest
    needs: deploy-to-azure
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Health check
      run: |
        sleep 30  # Wait for deployment to stabilize
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health || exit 1
