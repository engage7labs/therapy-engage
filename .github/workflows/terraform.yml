name: Terraform Infrastructure

on:
  push:
    branches: [dev]
    paths: ["infra/**"]
  pull_request:
    branches: [dev]
    paths: ["infra/**"]
  workflow_dispatch:
    inputs:
      sync_secrets:
        description: "Sync Terraform outputs to GitHub secrets"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7"
  ARM_USE_OIDC: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="dev-eu-ie.tfvars" -out=dev.tfplan

      - name: Terraform Apply (on push to dev)
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        run: terraform apply -auto-approve dev.tfplan

      - name: Sync Terraform outputs to GitHub secrets (opt-in)
        if: |
          (github.ref == 'refs/heads/dev' && github.event_name == 'push') || 
          (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_secrets == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract outputs and set as GitHub secrets
          AZURE_CLIENT_ID=$(terraform output -raw azure_client_id)
          AZURE_TENANT_ID=$(terraform output -raw azure_tenant_id)
          AZURE_SUBSCRIPTION_ID=$(terraform output -raw azure_subscription_id)
          RESOURCE_GROUP=$(terraform output -raw resource_group)
          ACA_FRONTEND_NAME=$(terraform output -raw aca_frontend_name)
          ACA_BACKEND_NAME=$(terraform output -raw aca_backend_name)

          # Set secrets using GitHub CLI
          gh secret set AZURE_CLIENT_ID --body "$AZURE_CLIENT_ID"
          gh secret set AZURE_TENANT_ID --body "$AZURE_TENANT_ID" 
          gh secret set AZURE_SUBSCRIPTION_ID --body "$AZURE_SUBSCRIPTION_ID"
          gh secret set RESOURCE_GROUP --body "$RESOURCE_GROUP"
          gh secret set ACA_FRONTEND_NAME --body "$ACA_FRONTEND_NAME"
          gh secret set ACA_BACKEND_NAME --body "$ACA_BACKEND_NAME"

          echo "✅ Secrets synchronized successfully"

      - name: Terraform Output Summary
        if: always()
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          # Only show non-sensitive outputs in summary
          terraform output -json | jq -r 'to_entries[] | select(.value.sensitive == false) | "| \(.key) | \(.value.value) |"' >> $GITHUB_STEP_SUMMARY || echo "| N/A | Outputs not available |" >> $GITHUB_STEP_SUMMARY
