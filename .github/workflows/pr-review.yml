name: Pull Request Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [dev, main]

env:
  NODE_VERSION: "18.x"

jobs:
  # Automated code quality checks
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Run TypeScript check
        run: |
          cd web
          npx tsc --noEmit

      - name: Run ESLint with annotations
        run: |
          cd web
          npx eslint . --ext .ts,.tsx,.js,.jsx --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload ESLint results to GitHub
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: web/eslint-results.sarif
          wait-for-processing: true

      - name: Build check
        run: |
          cd web
          npm run build

      - name: Bundle size check
        run: |
          cd web
          npx @next/bundle-analyzer --help || echo "Bundle analyzer not configured"

      # Comment on PR with results
      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = './web/.next/analyze.json';

            let comment = '## 🚀 Build Report\n\n';
            comment += '✅ TypeScript compilation passed\n';
            comment += '✅ ESLint checks completed\n';
            comment += '✅ Build successful\n\n';
            comment += '### Next Steps:\n';
            comment += '- Review code changes\n';
            comment += '- Test functionality manually\n';
            comment += '- Approve if ready for merge\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Run visual regression tests (if applicable)
  visual-regression:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Build application
        run: |
          cd web
          npm run build

      - name: Start application for testing
        run: |
          cd web
          npm start &
          sleep 10  # Wait for app to start

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun || echo "Lighthouse CI not fully configured"
        continue-on-error: true
