name: Web Portal CI/CD

on:
  push:
    branches: [dev, main]
    paths: ['web/**', 'charts/web-portal/**']
  pull_request:
    branches: [dev, main]
    paths: ['web/**', 'charts/web-portal/**']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: therapyengageorg/web-portal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Azure Login
      uses: azure/login@v1
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
      with:
        version: 'latest'

    - name: Get AKS credentials
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
      run: |
        az aks get-credentials --resource-group rg-therapy-dev --name aks-therapy

    - name: Set up Helm
      uses: azure/setup-helm@v4
      if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
      with:
        version: 'latest'

    - name: Deploy to AKS (DEV)
      if: github.ref == 'refs/heads/dev'
      run: |
        # Extract image tag from metadata
        IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1 | sed 's/.*://')
        # Set shell variables for proper expansion
        REPOSITORY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        echo "Using image: ${REPOSITORY}:${IMAGE_TAG}"
        
        # Create web-portal HELM chart if doesn't exist
        if [ ! -d "charts/web-portal" ]; then
          echo "Creating web-portal chart from template..."
          cp -r charts/backend-app charts/web-portal
          # Create proper Chart.yaml
          cat > charts/web-portal/Chart.yaml << EOF
        apiVersion: v2
        name: web-portal
        description: Therapy Engage Web Portal
        type: application
        version: 0.1.0
        appVersion: "1.0.0"
        EOF
        fi
        
        # Deploy using HELM with values.yaml + image override
        helm upgrade --install web-portal ./charts/web-portal \
          --set image.repository=${REPOSITORY} \
          --set image.tag=${IMAGE_TAG} \
          --wait --timeout=5m

    - name: Verify Deployment
      if: success() && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${GITHUB_REF#refs/heads/}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
        echo "- **Image:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        if [ "${GITHUB_REF}" == "refs/heads/dev" ]; then
          echo "- **Portal URL:** https://20.82.234.39.sslip.io" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Check deployment status
        kubectl get pods -l app=web-portal
        kubectl get svc web-portal
        kubectl get ingress web-portal-ingress